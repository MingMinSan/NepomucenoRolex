<!DOCTYPE html>
<html>
<head>
    <title>Hitman</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: flex-end;
            padding: 20px 60px;
            background: white;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 40px;
            margin: 0;
        }

        nav ul li {
            cursor: pointer;
            font-size: 14px;
        }

        /* Hero Section */
        .hero {
            display: flex;
            height: 90vh;
        }

        .left-image {
            flex: 1;
            background-image: url(""); 
            background-size: cover;
            background-position: center;
        }

        .right-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px;
        }

        .right-text h1 {
            font-size: 70px;
            margin: 0;
            letter-spacing: 5px;
        }

        .right-text p {
            font-size: 18px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <nav>
        <ul>
            <li  style="color: #850828">Home</li>
            <li style="color: #850828">Hitman</li>
            <li style="color: #850828">Payment</li>
        </ul>
    </nav>

    <section class="hero">
        <div class="left-image"></div>

        <div class="right-text">
            <h1 style="color: #850828">Get your very own hitman</h1>
            <p style="color: #872941">(dont take this seriously)</p>
            <p style="margin-top: 30px; font-size: 20px;">Get your very own hitman and bring down the people
you wanna bring down — all at a surprisingly cheap price.
</p>
        </div>
    </section>

</body>
</html>
