<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hitman Shop</title>
<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background-image: url('bg2.png'); 
  background-size: cover;       
  background-position: center;  
  background-repeat: no-repeat; 
  color:white;
}

.container{
  text-align:center;
  padding:40px;
}

.title{
  font-size:40px;
  letter-spacing:4px;
  margin-bottom:50px;
  font-weight: bold;               
  color: #cf3651;                   
  text-shadow: 2px 2px 5px rgba(0,0,0,0.7);
}

.cards{
  display:flex;
  justify-content:center;
  gap:80px;
  flex-wrap:wrap;
}

.card{
  width:260px;
  background:rgba(20,20,25,0.8);
  border-radius:12px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.card img{
  width:100%;
  border-radius:10px;
}

.name{
  font-size:26px;
  margin-top:10px;
  font-weight:bold;
}

.price{
  color:#ff4d6d;
  font-size:22px;
  margin:15px 0;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#7a1f2b;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#a42c3d;
}

.back{
  position:absolute;
  top:20px;
  left:20px;
  background:#333;
}

</style>
</head>

<body>

<button class="back" onclick="goHome()">⬅ Back to Home</button>

<div class="container">

<div class="title">HITMAN</div>

<div class="cards">

<div class="card">
<img src="sakamoto.jpg">
<div class="name">Taro Sakamoto</div>
<div class="price">$20,000</div>
<button onclick="pay('Taro Sakamoto')">PAY NOW</button>
</div>

<div class="card">
<img src="johnwick.png">
<div class="name">John Wick</div>
<div class="price">$30,000</div>
<button onclick="pay('John Wick')">PAY NOW</button>
</div>

</div>
</div>

<script>
function pay(name){
  alert("Payment started for " + name);
}

function goHome(){
  window.location.href = "index.html"; 
}
</script>

</body>
</html>
